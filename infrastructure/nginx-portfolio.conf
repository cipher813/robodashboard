# Reference only — the live nginx config is managed in the alpha-engine-dashboard
# repo (infrastructure/nginx.conf) and auto-deployed to the EC2 on push to main.
# This is the server block to add there for portfolio.nousergon.ai → :8504.
#
# portfolio.nousergon.ai must also be added to the HTTP→HTTPS redirect block's
# server_name, and protected by a Cloudflare Access policy at the edge.

server {
    listen 443 ssl;
    server_name portfolio.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:8504;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
